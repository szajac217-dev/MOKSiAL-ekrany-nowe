<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060910;color:white;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}:root{--safe:clamp(12px,1.35vw,24px);--header-h:clamp(94px,11vh,134px);--dock-h:clamp(145px,17vh,195px);--line:rgba(255,255,255,.16);--muted:rgba(255,255,255,.70);--clock:#fff;--a:#65d9ff;--b:#ff4f91;--c:#ffcf4a;--d:#58d56b;--dur:8000ms;--green:#079b39;--green2:#86c947;--yellow:#e4df00;--orange:#f28c00;--red:#e73139;--blue:#1e88e5}

t{background:#d82128}.kino-dkf{display:inline-block;padding:4px 8px;border-radius:999px;background:var(--blue);color:#fff;font-size:11px;font-weight:950;vertical-align:middle;line-height:1.15}.kino-empty{margin-top:12px;padding:18px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:850;color:rgba(255,255,255,.82)}
.dock{position:absolute;left:calc(var(--safe)*2.1);right:calc(var(--safe)*2.1);bottom:calc(var(--safe)*1.75);height:var(--dock-h);z-index:20;display:block;pointer-events:none}.qrgrid{position:relative;width:100%;height:100%;display:block}.qrcard{position:absolute;bottom:0;width:clamp(145px,15.5vw,215px);height:100%;border-radius:24px;padding:clamp(6px,.65vw,10px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:clamp(2px,.28vh,4px);overflow:visible;pointer-events:auto}.qrcard.moksial{left:0}.qrcard.miasto{right:0}.qrcard:before{content:"";position:absolute;inset:-45%;z-index:-1;opacity:.85;background:radial-gradient(circle at 50% 18%,var(--ga),transparent 46%),radial-gradient(circle at 60% 90%,var(--gb),transparent 54%);filter:blur(22px);transform:scale(1.08)}.moksial{--ga:rgba(231,49,57,.42);--gb:rgba(7,155,57,.34)}.miasto{--ga:rgba(101,217,255,.36);--gb:rgba(255,177,59,.30)}.qrtitle{font-size:clamp(12px,1.05vw,17px);line-height:1;font-weight:950;letter-spacing:-.035em;text-align:center;order:2}.qrtitle strong{display:block;font-size:1em}.moksial .qrtitle strong{background:linear-gradient(90deg,#e73139,#ff8a39,#e4df00,#079b39);-webkit-background-clip:text;background-clip:text;color:transparent}.miasto .qrtitle strong{background:linear-gradient(90deg,#65d9ff,#7f93ff,#fff);-webkit-background-clip:text;background-clip:text;color:transparent}.help{font-size:clamp(8px,.72vw,11px);line-height:1;font-weight:800;color:rgba(255,255,255,.74);text-align:center;order:3}.qri{width:clamp(122px,12.6vw,176px);height:clamp(122px,12.6vw,176px);border-radius:clamp(8px,.75vw,12px);background:rgba(255,255,255,.98);display:grid;place-items:center;box-shadow:0 12px 28px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.9);overflow:visible;order:1;flex:0 0 auto}.qri img{width:98%;height:98%;object-fit:contain;display:block}.msg{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;background:rgba(3,6,12,.86);font-size:clamp(20px,2.2vw,34px);font-weight:900}.err{color:#ffb6b6}
@media (orientation:landscape){:root{--dock-h:clamp(150px,20vh,205px);--header-h:clamp(78px,12vh,116px)}.stage{left:calc(var(--safe)*2.25);right:calc(50vw + var(--safe)*.5);bottom:calc(var(--safe)*1.75 + 10px)}.poster-shell{width:100%;max-width:none}.dock{left:calc(50vw + var(--safe)*.5);top:calc(var(--safe)*2.1 + var(--header-h) + clamp(12px,1.5vh,20px));bottom:calc(var(--safe)*1.75);height:auto}.qri{width:clamp(122px,14vh,176px);height:clamp(122px,14vh,176px)}}
@media (max-width:820px),(max-height:820px){:root{--safe:10px}.header{left:20px;right:20px;grid-template-columns:minmax(0,1fr) auto}.weather{display:none}.stage{left:24px;right:24px}.dock{left:20px;right:20px}.qrcard{padding:14px}.hello-line{font-size:clamp(20px,4.1vw,34px)}.kino-panel{padding:17px;border-radius:24px}.kino-title{font-size:clamp(32px,5.2vw,42px)}.kino-row{grid-template-columns:54px 1fr auto;gap:9px;padding:9px;min-height:78px}.kino-poster{width:54px;height:75px}.kino-row.featured{grid-template-columns:72px 1fr auto;padding:12px;gap:11px;min-height:112px}.featured .kino-poster{width:72px;height:102px}.kino-name{font-size:17px;line-height:1.22}.featured .kino-name{font-size:23px;line-height:1.18}.kino-meta{font-size:11px}.featured .kino-meta{font-size:12px}.kino-age,.featured .kino-age{min-width:36px;height:36px;font-size:12px}.kino-datepill,.kino-timepill{font-size:11px}.featured .kino-datepill,.featured .kino-timepill{font-size:13px}}

<body>
<div id="app">
<img id="bgA" class="bg on" alt=""><img id="bgB" class="bg" alt=""><div class="grain"></div><div class="frame"></div>
<header class="header"><section class="hello glass"><img id="logo" class="logo" src="logo-moksial.svg" alt="MOKSiAL"><div><div id="topmsg" class="hello-line">Miłego dnia</div><div id="mode" class="pill">MOKSiAL</div></div></section><section id="weather" class="weather glass"><div class="weather-row"><div id="wi1" class="wicon">☁️</div><div class="place">Szklarska Poręba</div><div id="wt1" class="temp">--°</div><div id="wd1" class="desc">--</div></div><div class="weather-row"><div id="wi2" class="wicon">☁️</div><div class="place">Śnieżka</div><div id="wt2" class="temp">--°</div><div id="wd2" class="desc">--</div></div></section><section class="clock-card glass"><div id="clock" class="clock">00:00</div><div id="date" class="date">--</div></section></header>
<main class="stage"><section class="poster-shell"><div class="viewport"><img id="sA" class="slide on" alt="Plakat"><img id="sB" class="slide" alt="Plakat"></div></section><section id="kinoSlide" class="kino-slide"></section><section class="carousel"><div class="pline"><div id="pfill" class="pfill"></div></div><div id="counter">00 / 00</div><div id="dots" class="dots"></div></section></main>
<footer class="dock"><section class="qrgrid"><article class="qrcard moksial glass"><div class="qri"><img id="qrm" src="qr-moksial.png" alt="Kod QR MOKSiAL"></div><div class="qrtitle"><strong>MOKSiAL</strong></div><div class="help">Skanuj</div></article><article class="qrcard miasto glass"><div class="qri"><img id="qrc" src="qr-miasto.png" alt="Kod QR Miasta"></div><div class="qrtitle"><strong>Miasto</strong></div><div class="help">Skanuj</div></article></section></footer><div id="msg" class="msg">Ładowanie plakatów...</div>
</div>
<script>
const normalDur=8000,longDur=30000,reload=900000,valid=/\.(jpg|jpeg|png|webp|gif)$/i;let cfg,kcfg,imgs=[],idx=0,act=0,bg=0,timer=null,started=false,msgs=[],last=-1,shown=0,lastKinoAt=-1,kinoData=null;const $=id=>document.getElementById(id);const els={msg:$('msg'),clock:$('clock'),date:$('date'),top:$('topmsg'),mode:$('mode'),logo:$('logo'),qrm:$('qrm'),qrc:$('qrc'),sA:$('sA'),sB:$('sB'),bgA:$('bgA'),bgB:$('bgB'),counter:$('counter'),dots:$('dots'),pfill:$('pfill'),weather:$('weather'),wi1:$('wi1'),wt1:$('wt1'),wd1:$('wd1'),wi2:$('wi2'),wt2:$('wt2'),wd2:$('wd2'),kino:$('kinoSlide')};
function params(){return new URLSearchParams(location.search)}function mode(){const p=params();return(p.get('ekran')||p.get('ekra')||'moksial').toLowerCase()}async function json(f){const r=await fetch(f+(f.includes('?')?'&':'?')+'v='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(f);return r.json()}function show(t,e=false){els.msg.textContent=t;els.msg.className=e?'msg err':'msg';els.msg.style.display='flex'}function hide(){els.msg.style.display='none'}
async function loadCfg(){cfg=await json(`config-${mode()==='miasto'?'miasto':mode()==='hybryda'?'hybryda':'moksial'}.json`);try{kcfg=await json('config-kino.json')}catch(e){kcfg={enabled:false}}let p=params();if(p.get('kino')==='0'||p.get('kino')==='false'||p.get('kino')==='off')kcfg.enabled=false;if(p.get('kino')==='1')kcfg.enabled=true;document.title=(cfg.title||'Ekrany informacyjne')+' + Kino';let r=document.documentElement;r.style.setProperty('--clock',cfg.clockColor||'#fff');r.style.setProperty('--a',cfg.accentA||'#65d9ff');r.style.setProperty('--b',cfg.accentB||'#ff4f91');r.style.setProperty('--c',cfg.accentC||'#ffcf4a');r.style.setProperty('--d',cfg.accentD||'#58d56b');els.mode.textContent=cfg.modeLabel||mode().toUpperCase();cfg.logoMoksial=cfg.logoMoksial||'logo-moksial.png';cfg.logoMiasto=cfg.logoMiasto||'logo-szklarska.png';els.logo.onerror=()=>{if(!els.logo.src.includes('logo-moksial.svg'))els.logo.src='logo-moksial.svg'};els.logo.src=(mode()==='miasto'?cfg.logoMiasto:cfg.logoMoksial)+'?v='+Date.now();els.qrm.src=(cfg.qrMoksial||'qr-moksial.png')+'?v='+Date.now();els.qrc.src=(cfg.qrMiasto||'qr-miasto.png')+'?v='+Date.now();msgs=(cfg.topMessages&&cfg.topMessages.length)?cfg.topMessages:['Miłego dnia'];els.top.textContent=pickMsg();setInterval(rotMsg,60000)}
async function loadKino(){if(!kcfg.enabled||!kcfg.json)return;try{kinoData=await json(kcfg.json)}catch(e){console.warn('Kino repertuar pominięty:',e);kinoData=null}}function pickMsg(){let i=Math.floor(Math.random()*msgs.length);if(msgs.length>1)while(i===last)i=Math.floor(Math.random()*msgs.length);last=i;return msgs[i]}function rotMsg(){els.top.animate([{opacity:1,transform:'translateY(0)',filter:'blur(0)'},{opacity:0,transform:'translateY(-10px)',filter:'blur(8px)'}],{duration:520,easing:'ease'}).onfinish=()=>{els.top.textContent=pickMsg();els.top.animate([{opacity:0,transform:'translateY(10px)',filter:'blur(8px)'},{opacity:1,transform:'translateY(0)',filter:'blur(0)'}],{duration:620,easing:'ease'})}}
function clock(){let n=new Date();els.clock.textContent=n.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});els.date.textContent=n.toLocaleDateString('pl-PL',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}function wv(c){if(c===0)return['☀️','Słonecznie'];if(c===1||c===2)return['🌤️','Dość ładnie'];if(c===3)return['☁️','Pochmurno'];if(c===45||c===48)return['🌫️','Mgła'];if((c>=51&&c<=67)||(c>=80&&c<=82))return['🌧️','Deszcz'];if((c>=71&&c<=77)||(c>=85&&c<=86))return['❄️','Śnieg'];if(c>=95)return['⛈️','Burza'];return['🌤️','Pogoda']}async function weather(){try{let [a,b]=await Promise.all([fetch('https://api.open-meteo.com/v1/forecast?latitude=50.83&longitude=15.52&current=temperature_2m,weather_code',{cache:'no-store'}),fetch('https://api.open-meteo.com/v1/forecast?latitude=50.736&longitude=15.739&current=temperature_2m,weather_code',{cache:'no-store'})]);if(!a.ok||!b.ok)throw Error();let c=await a.json(),s=await b.json(),cv=wv(c.current.weather_code),sv=wv(s.current.weather_code);els.wi1.textContent=cv[0];els.wd1.textContent=cv[1];els.wt1.textContent=Math.round(c.current.temperature_2m)+'°';els.wi2.textContent=sv[0];els.wd2.textContent=sv[1];els.wt2.textContent=Math.round(s.current.temperature_2m)+'°';els.weather.style.display='grid'}catch(e){els.weather.style.display='none'}}
function setLogoFor(src){let low=(src||'').toLowerCase();let logo=cfg.logoMoksial||'logo-moksial.png';if(mode()==='miasto'||low.includes('plakaty-miasto'))logo=cfg.logoMiasto||'logo-szklarska.png';if(mode()==='moksial'||low.includes('plakaty-moksial'))logo=cfg.logoMoksial||'logo-moksial.png';if(!els.logo.src.includes(logo))els.logo.src=logo+'?v='+Date.now()}async function loadImgs(){try{let a=await json(cfg.postersJson);imgs=a.filter(x=>typeof x==='string'&&valid.test(x));if(!imgs.length)throw Error();hide();dots();if(!started){start();started=true}}catch(e){show('Nie udało się wczytać plakatów z pliku '+cfg.postersJson,true)}}function dur(src){return src.split('/').pop().toLowerCase().includes('dluzej')?longDur:normalDur}function active(){return act?els.sB:els.sA}function inactive(){return act?els.sA:els.sB}function activeBg(){return bg?els.bgB:els.bgA}function inactiveBg(){return bg?els.bgA:els.bgB}function dots(){els.dots.innerHTML='';for(let i=0;i<Math.min(imgs.length,6);i++){let d=document.createElement('span');d.className='dot';els.dots.appendChild(d)}}function carousel(i,d,label){els.counter.textContent=label||String(i+1).padStart(2,'0')+' / '+String(imgs.length).padStart(2,'0');[...els.dots.children].forEach((x,n)=>x.classList.toggle('active',!label&&n===i%Math.max(1,els.dots.children.length)));document.documentElement.style.setProperty('--dur',d+'ms');els.pfill.classList.remove('run');void els.pfill.offsetWidth;els.pfill.classList.add('run')}function setBg(src){let c=activeBg(),n=inactiveBg();n.onload=()=>{n.classList.add('on');c.classList.remove('on');bg=bg?0:1};n.src=src}
function trans(si,so,t,d){si.className='slide';si.style.transition='none';si.style.opacity=0;si.style.transform='translate3d(0,0,0) scale(1) rotate(0)';let inf=Math.min(1800,d*.22),out=Math.min(1300,d*.16);if(t==='zoom'){si.style.transform='scale(1.045)';void si.offsetHeight;si.style.transition=`opacity ${inf}ms ease,transform ${d}ms linear`;so.style.transition=`opacity ${out}ms ease`;si.style.opacity=1;si.style.transform='scale(1)';so.style.opacity=0}else{let x=t==='left'?4:t==='right'?-4:0,y=t==='rise'?3:0;si.style.transform=`translate3d(${x}%,${y}%,0) scale(1)`;void si.offsetHeight;si.style.transition=`opacity ${inf}ms ease,transform ${inf}ms ease`;so.style.transition=`opacity ${out}ms ease,transform ${out}ms ease`;si.style.opacity=1;si.style.transform='translate3d(0,0,0) scale(1)';so.style.opacity=0;so.style.transform=`translate3d(${-x/2}%,-${y/2}%,0) scale(1)`}si.classList.add('on');so.classList.remove('on')}function rt(){return['fade','rise','left','right','zoom'][Math.floor(Math.random()*5)]}function schedule(d){clearTimeout(timer);timer=setTimeout(next,d)}function shouldKino(){let every=Math.max(1,Number(kcfg.every||5));return kcfg.enabled&&kinoData&&shown>0&&shown%every===0&&lastKinoAt!==shown&&renderKino(todayStr())}
function next(){if(shouldKino()){showKino();return}let so=active(),si=inactive(),src=imgs[idx],d=dur(src),i=idx;setLogoFor(src);els.kino.classList.remove('on');si.onload=()=>{setBg(src);trans(si,so,rt(),d);carousel(i,d);act=act?0:1;idx=(idx+1)%imgs.length;shown++;schedule(d)};si.onerror=()=>{idx=(idx+1)%imgs.length;schedule(1200)};si.src=src}function start(){let src=imgs[idx],d=dur(src),s=active(),b=activeBg();setLogoFor(src);b.src=src;b.onload=()=>b.classList.add('on');s.onload=()=>{s.style.transition='opacity 1000ms ease';s.style.opacity=1;s.classList.add('on');carousel(idx,d);idx=(idx+1)%imgs.length;shown++;schedule(d)};s.onerror=()=>show('Nie udało się załadować pierwszego plakatu.',true);s.src=src}function showKino(){lastKinoAt=shown;els.kino.classList.add('on');carousel(0,Math.max(8000,Number(kcfg.duration||20000)),'KINO');schedule(Math.max(8000,Number(kcfg.duration||20000)))}
function todayStr(){let p=params(),v=p.get('kinoDate')||p.get('data');if(v)return v;let n=new Date();return String(n.getDate()).padStart(2,'0')+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+n.getFullYear()}function parseDate(s){let [d,m,y]=String(s).split('.').map(Number);return new Date(y,m-1,d)}function ageFmt(a){let v=String(a||'');return v.includes('+')?v:v+'+'}function ageCls(a){let n=String(a||'').replace('+','');if(['7','9'].includes(n))return'family';if(n==='13')return'teen';if(n==='18')return'adult';return''}function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function upcomingFrom(dateStr){let cur=parseDate(dateStr).getTime();let all=(kinoData.movies||[]).filter(m=>parseDate(m.date).getTime()>=cur);return all.sort((a,b)=>parseDate(a.date)-parseDate(b.date)||String(a.time).localeCompare(String(b.time)))}
function renderKino(dateStr){let all=kinoData&&Array.isArray(kinoData.movies)?kinoData.movies:[];if(!all.length)return false;let items=upcomingFrom(dateStr);if(!items.length)items=[...all].sort((a,b)=>parseDate(a.date)-parseDate(b.date)||String(a.time).localeCompare(String(b.time)));items=items.slice(0,Math.max(4,Number(kcfg.maxItems||12)));if(!items.length)return false;let featuredKeys=new Set(items.slice(0,2).map(m=>m.date+'|'+m.time+'|'+m.title));els.kino.innerHTML=`<section class="kino-panel"><div class="kino-kicker">Kino Za Rogiem · MOKSiAL</div><h1 class="kino-title">Repertuar kina</h1><p class="kino-sub">Najbliższe 2 seanse są powiększone, dalszy repertuar poniżej</p><div class="kino-strip"></div><div class="kino-list">${items.map(m=>kinoRow(m,featuredKeys.has(m.date+'|'+m.time+'|'+m.title))).join('')}</div></section>`;return true}function kinoRow(m,featured){let base=kcfg.posterBase||'https://raw.githubusercontent.com/szajac217-dev/repertuar-test/main/posters/';return `<article class="kino-row ${featured?'featured':''}"><div class="kino-poster"><img src="${base}${esc(m.poster)}" alt="${esc(m.title)}" onerror="this.style.display='none'"></div><div class="kino-info"><div class="kino-line1"><span class="kino-datepill ${featured?'green':''}">${esc(m.date)}</span><span class="kino-timepill">${esc(m.time)}</span>${m.dkf?'<span class="kino-dkf">DKF</span>':''}</div><div class="kino-name">${esc(m.title)}</div><div class="kino-meta">${esc(m.genre)} · ${esc(m.duration)} min</div></div><div class="kino-age ${ageCls(m.age)}">${ageFmt(m.age)}</div></article>`}
(async function(){try{await loadCfg();clock();setInterval(clock,1000);await weather();setInterval(weather,900000);await loadKino();await loadImgs();setInterval(()=>location.reload(),reload)}catch(e){console.error(e);show('Nie udało się uruchomić ekranu.',true)}})();
</script>
