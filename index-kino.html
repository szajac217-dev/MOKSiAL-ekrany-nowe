function params(){return new URLSearchParams(location.search)}function mode(){const p=params();return(p.get('ekran')||p.get('ekra')||'moksial').toLowerCase()}async function json(f){const r=await fetch(f+(f.includes('?')?'&':'?')+'v='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(f);return r.json()}function show(t,e=false){els.msg.textContent=t;els.msg.className=e?'msg err':'msg';els.msg.style.display='flex'}function hide(){els.msg.style.display='none'}function logoMoksial(){return cfg.logoMoksial||'logo-moksial.png'}function logoMiasto(){return cfg.logoMiasto||'logo-szklarska.png'}function setLogo(src){let low=String(src||'').toLowerCase();let chosen=logoMoksial();if(mode()==='miasto')chosen=logoMiasto();else if(mode()==='moksial')chosen=logoMoksial();else if(low.includes('plakaty-miasto')||low.includes('/miasto/')||low.includes('miasto'))chosen=logoMiasto();else if(low.includes('plakaty-moksial')||low.includes('/moksial/')||low.includes('moksial'))chosen=logoMoksial();els.logo.src=chosen+(chosen.includes('?')?'&':'?')+'v='+Date.now()}function forceMoksialLogo(){els.logo.src=logoMoksial()+'?v='+Date.now()}
async function loadCfg(){cfg=await json(`config-${mode()==='miasto'?'miasto':mode()==='hybryda'?'hybryda':'moksial'}.json`);try{kcfg=await json('config-kino.json')}catch(e){kcfg={enabled:false}}let p=params();if(p.get('kino')==='0'||p.get('kino')==='false'||p.get('kino')==='off')kcfg.enabled=false;if(p.get('kino')==='1')kcfg.enabled=true;document.title=(cfg.title||'Ekrany informacyjne')+' + Kino';document.documentElement.style.setProperty('--clock',cfg.clockColor||'#fff');document.documentElement.style.setProperty('--a',cfg.accentA||'#65d9ff');document.documentElement.style.setProperty('--b',cfg.accentB||'#ff4f91');document.documentElement.style.setProperty('--c',cfg.accentC||'#ffcf4a');document.documentElement.style.setProperty('--d',cfg.accentD||'#58d56b');cfg.logoMoksial=cfg.logoMoksial||'logo-moksial.png';cfg.logoMiasto=cfg.logoMiasto||'logo-szklarska.png';els.qrm.src=(cfg.qrMoksial||'qr-moksial.png')+'?v='+Date.now();els.qrc.src=(cfg.qrMiasto||'qr-miasto.png')+'?v='+Date.now();msgs=(cfg.topMessages&&cfg.topMessages.length)?cfg.topMessages:['Miłego dnia'];els.top.textContent=pickMsg();setLogo('');setInterval(rotMsg,60000)}
async function loadKino(){if(!kcfg.enabled||!kcfg.json)return;try{kinoData=await json(kcfg.json)}catch(e){console.warn('Kino repertuar pominięty:',e);kinoData=null}}function pickMsg(){let i=Math.floor(Math.random()*msgs.length);if(msgs.length>1)while(i===last)i=Math.floor(Math.random()*msgs.length);last=i;return msgs[i]}function rotMsg(){els.top.animate([{opacity:1,transform:'translateY(0)',filter:'blur(0)'},{opacity:0,transform:'translateY(-10px)',filter:'blur(8px)'}],{duration:520,easing:'ease'}).onfinish=()=>{els.top.textContent=pickMsg();els.top.animate([{opacity:0,transform:'translateY(10px)',filter:'blur(8px)'},{opacity:1,transform:'translateY(0)',filter:'blur(0)'}],{duration:620,easing:'ease'})}}
function clock(){let n=new Date();els.clock.textContent=n.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});els.date.textContent=n.toLocaleDateString('pl-PL',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}function wv(c){if(c===0)return['☀️','Słonecznie'];if(c===1||c===2)return['🌤️','Dość ładnie'];if(c===3)return['☁️','Pochmurno'];if(c===45||c===48)return['🌫️','Mgła'];if((c>=51&&c<=67)||(c>=80&&c<=82))return['🌧️','Deszcz'];if((c>=71&&c<=77)||(c>=85&&c<=86))return['❄️','Śnieg'];if(c>=95)return['⛈️','Burza'];return['🌤️','Pogoda']}async function weather(){try{let [a,b]=await Promise.all([fetch('https://api.open-meteo.com/v1/forecast?latitude=50.83&longitude=15.52&current=temperature_2m,weather_code',{cache:'no-store'}),fetch('https://api.open-meteo.com/v1/forecast?latitude=50.736&longitude=15.739&current=temperature_2m,weather_code',{cache:'no-store'})]);if(!a.ok||!b.ok)throw Error();let c=await a.json(),s=await b.json(),cv=wv(c.current.weather_code),sv=wv(s.current.weather_code);els.wi1.textContent=cv[0];els.wd1.textContent=cv[1];els.wt1.textContent=Math.round(c.current.temperature_2m)+'°';els.wi2.textContent=sv[0];els.wd2.textContent=sv[1];els.wt2.textContent=Math.round(s.current.temperature_2m)+'°';els.weather.style.display='grid'}catch(e){els.weather.style.display='none'}}
async function loadImgs(){try{let a=await json(cfg.postersJson);imgs=a.filter(x=>typeof x==='string'&&valid.test(x));if(!imgs.length)throw Error();buildSequence();hide();if(!started){showSequenceItem();started=true}}catch(e){show('Nie udało się wczytać plakatów z pliku '+cfg.postersJson,true)}}function buildSequence(){sequence=[];let every=Math.max(1,Number(kcfg.every||5));imgs.forEach((src,i)=>{sequence.push({type:'poster',src,posterIndex:i});if(kcfg.enabled&&kinoData&&((i+1)%every===0))sequence.push({type:'kino'});});dots()}function dots(){els.dots.innerHTML='';for(let i=0;i<6;i++){let d=document.createElement('span');d.className='dot';els.dots.appendChild(d)}}function updateCarousel(pos,d){let total=Math.max(1,sequence.length),cur=(pos%total)+1;els.counter.textContent=String(cur).padStart(2,'0')+' / '+String(total).padStart(2,'0');[...els.dots.children].forEach((x,n)=>x.classList.toggle('active',n===((cur-1)%6)));document.documentElement.style.setProperty('--dur',d+'ms');els.pfill.classList.remove('run');void els.pfill.offsetWidth;els.pfill.classList.add('run')}function dur(src){return src.split('/').pop().toLowerCase().includes('dluzej')?longDur:normalDur}function active(){return act?els.sB:els.sA}function inactive(){return act?els.sA:els.sB}function activeBg(){return bg?els.bgB:els.bgA}function inactiveBg(){return bg?els.bgA:els.bgB}function setBg(src){let c=activeBg(),n=inactiveBg();n.onload=()=>{n.classList.add('on');c.classList.remove('on');bg=bg?0:1};n.src=src}function trans(si,so,t,d){si.className='slide';si.style.transition='none';si.style.opacity=0;si.style.transform=t==='zoom'?'scale(1.045)':'scale(1)';void si.offsetHeight;si.style.transition=`opacity ${Math.min(1800,d*.22)}ms ease,transform ${d}ms linear`;so.style.transition=`opacity ${Math.min(1300,d*.16)}ms ease`;si.style.opacity=1;si.style.transform='scale(1)';so.style.opacity=0;si.classList.add('on');so.classList.remove('on')}function schedule(d){clearTimeout(timer);timer=setTimeout(showSequenceItem,d)}
function showSequenceItem(){if(!sequence.length)return;let pos=seqIndex%sequence.length,item=sequence[pos];if(item.type==='kino'&&renderKino(todayStr())){forceMoksialLogo();els.kino.classList.add('on');let d=Math.max(8000,Number(kcfg.duration||20000));updateCarousel(pos,d);seqIndex++;schedule(d);return}els.kino.classList.remove('on');let src=item.src,d=dur(src),so=active(),si=inactive();setLogo(src);si.onload=()=>{setBg(src);trans(si,so,Math.random()>.5?'zoom':'fade',d);updateCarousel(pos,d);act=act?0:1;seqIndex++;schedule(d)};si.onerror=()=>{seqIndex++;schedule(800)};si.src=src}
function todayStr(){let p=params(),v=p.get('kinoDate')||p.get('data');if(v)return v;let n=new Date();return String(n.getDate()).padStart(2,'0')+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+n.getFullYear()}function parseDate(s){let [d,m,y]=String(s).split('.').map(Number);return new Date(y,m-1,d)}function ageFmt(a){let v=String(a||'');return v.includes('+')?v:v+'+'}function ageCls(a){let n=String(a||'').replace('+','');if(['7','9'].includes(n))return'family';if(n==='13')return'teen';if(n==='18')return'adult';return''}function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}function upcomingFrom(dateStr){let cur=parseDate(dateStr).getTime();let all=(kinoData.movies||[]).filter(m=>parseDate(m.date).getTime()>=cur);return all.sort((a,b)=>parseDate(a.date)-parseDate(b.date)||String(a.time).localeCompare(String(b.time)))}function dailyKinoInfo(dateStr){let count=(kinoData.movies||[]).filter(m=>m.date===dateStr).length;if(count===0)return'Dziś nie ma seansu — pokazujemy najbliższy repertuar';if(count===1)return'Dziś w Kinie Za Rogiem jest 1 seans';if(count>=2&&count<=4)return`Dziś w Kinie Za Rogiem są ${count} seanse`;return`Dziś w Kinie Za Rogiem jest ${count} seansów`}function mapQrHtml(){if(!kcfg.mapQr||!kcfg.mapQrImage)return'';let img=esc(kcfg.mapQrImage);return`<aside class="kino-route"><strong>JAK DOTRZEĆ?</strong><span>Zeskanuj QR</span><img src="${img}" alt="Kod QR - jak dotrzeć do kina" onerror="this.closest('.kino-route').style.display='none'"></aside>`}function renderKino(dateStr){let all=kinoData&&Array.isArray(kinoData.movies)?kinoData.movies:[];if(!all.length)return false;let items=upcomingFrom(dateStr);if(!items.length)items=[...all].sort((a,b)=>parseDate(a.date)-parseDate(b.date)||String(a.time).localeCompare(String(b.time)));items=items.slice(0,Math.max(3,Number(kcfg.maxItems||5)));if(!items.length)return false;let featuredKeys=new Set(items.slice(0,2).map(m=>m.date+'|'+m.time+'|'+m.title));let sub=esc(dailyKinoInfo(dateStr));els.kino.innerHTML=`<section class="kino-panel">${mapQrHtml()}<div class="kino-head"><div class="kino-kicker">Kino Za Rogiem · MOKSiAL</div><h1 class="kino-title">Repertuar kina</h1><p class="kino-sub">${sub}</p></div><div class="kino-strip"></div><div class="kino-list">${items.map(m=>kinoRow(m,featuredKeys.has(m.date+'|'+m.time+'|'+m.title))).join('')}</div></section>`;return true}function kinoRow(m,featured){let base=kcfg.posterBase||'https://raw.githubusercontent.com/szajac217-dev/repertuar-test/main/posters/';return`<article class="kino-row ${featured?'featured':''}"><div class="kino-poster"><img src="${base}${esc(m.poster)}" alt="${esc(m.title)}" onerror="this.style.display='none'"></div><div class="kino-info"><div class="kino-line1"><span class="kino-datepill ${featured?'green':''}">${esc(m.date)}</span><span class="kino-timepill">${esc(m.time)}</span>${m.dkf?'<span class="kino-dkf">DKF</span>':''}</div><div class="kino-name">${esc(m.title)}</div><div class="kino-meta">${esc(m.genre)} · ${esc(m.duration)} min</div></div><div class="kino-age ${ageCls(m.age)}">${ageFmt(m.age)}</div></article>`}
(async function(){try{await loadCfg();clock();setInterval(clock,1000);await weather();setInterval(weather,900000);await loadKino();await loadImgs();setInterval(()=>location.reload(),reload)}catch(e){console.error(e);show('Nie udało się uruchomić ekranu.',true)}})();
</script></body></html>
