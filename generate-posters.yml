name: Generate poster JSON files

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "5 0 * * *"

permissions:
  contents: write

jobs:
  build-posters-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate JSON files
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from datetime import date

          DATE_PATTERN = re.compile(r'(\d{4}-\d{2}-\d{2})')
          WEIGHT_PATTERN = re.compile(r'(?i)(?:^|[_\\-\\s])W(10|[1-9])(?:[_\\-\\s.]|$)')

          def get_file_date(filename):
              match = DATE_PATTERN.search(filename)
              if not match:
                  return None

              try:
                  return date.fromisoformat(match.group(1))
              except ValueError:
                  return None

          def get_weight(filename):
              match = WEIGHT_PATTERN.search(filename)
              if not match:
                  return 0

              return int(match.group(1))

          def is_active_file(filename):
              file_date = get_file_date(filename)

              # Brak daty = plakat stały, zostaje w systemie
              if file_date is None:
                  return True

              # Plakat znika dopiero następnego dnia po dacie z nazwy
              return file_date >= date.today()

          def sort_key(filename):
              file_date = get_file_date(filename)
              weight = get_weight(filename)

              # Pliki bez daty lecą za plikami z datą w tej samej wadze
              sort_date = file_date if file_date is not None else date.max

              # Najpierw najwyższa waga, potem najbliższa data
              return (-weight, sort_date, filename.lower())

          def get_images(folder):
              if not os.path.exists(folder):
                  return []

              valid_ext = ('.jpg', '.jpeg', '.png', '.webp', '.gif')
              files = []

              for f in os.listdir(folder):
                  path = os.path.join(folder, f)

                  if (
                      os.path.isfile(path)
                      and f.lower().endswith(valid_ext)
                      and is_active_file(f)
                  ):
                      files.append(f"{folder}/{f}")

              files.sort(key=lambda x: sort_key(os.path.basename(x)))
              return files

          moksial_images = get_images("Plakaty-MOKSiAL")
          miasto_images = get_images("Plakaty-Miasto")

          # Hybryda:
          # najpierw MOKSiAL według wagi i daty,
          # potem Miasto według wagi i daty
          hybryda_images = moksial_images + miasto_images

          outputs = {
              "plakaty-moksial.json": moksial_images,
              "plakaty-miasto.json": miasto_images,
              "plakaty-hybryda.json": hybryda_images
          }

          for output_file, images in outputs.items():
              with open(output_file, "w", encoding="utf-8") as f:
                  json.dump(images, f, ensure_ascii=False, indent=2)
                  f.write("\n")

              print(f"Wygenerowano {output_file}:")
              print(json.dumps(images, ensure_ascii=False, indent=2))

          EOF

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add plakaty-moksial.json plakaty-miasto.json plakaty-hybryda.json

          git diff --cached --quiet || git commit -m "Automatyczna aktualizacja list plakatów"
          git push
