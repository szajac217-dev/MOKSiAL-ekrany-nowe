<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekrany informacyjne</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060910;color:white;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}:root{--safe:clamp(12px,1.35vw,24px);--header-h:clamp(94px,11vh,134px);--dock-h:clamp(230px,24vh,316px);--glass:rgba(13,20,35,.62);--line:rgba(255,255,255,.16);--muted:rgba(255,255,255,.68);--clock:#fff;--a:#65d9ff;--b:#ff4f91;--c:#ffcf4a;--d:#58d56b;--dur:8000ms}
    #app{position:relative;width:100vw;height:100vh;overflow:hidden;isolation:isolate;background:radial-gradient(circle at 14% 18%,color-mix(in srgb,var(--a) 24%,transparent),transparent 31%),radial-gradient(circle at 88% 76%,color-mix(in srgb,var(--b) 22%,transparent),transparent 32%),radial-gradient(circle at 46% 100%,color-mix(in srgb,var(--c) 15%,transparent),transparent 34%),linear-gradient(145deg,#070b13,#0b1526 45%,#080b14)}
    .bg{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover;filter:blur(82px) brightness(.42) saturate(1.35);transform:scale(1.08);opacity:0;transition:opacity 1600ms ease;z-index:0}.bg.on{opacity:1}.grain{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.36;background:radial-gradient(circle at 16% 22%,rgba(255,255,255,.08) 0 1px,transparent 2px),radial-gradient(circle at 82% 18%,rgba(255,255,255,.06) 0 1px,transparent 2px),linear-gradient(180deg,rgba(255,255,255,.06),transparent);background-size:160px 160px,230px 230px,100% 100%}.frame{position:absolute;inset:var(--safe);z-index:2;border:1px solid rgba(255,255,255,.18);border-radius:clamp(24px,3vw,46px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 24px 70px rgba(0,0,0,.38);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));pointer-events:none}
    .header{position:absolute;left:calc(var(--safe)*2.1);right:calc(var(--safe)*2.1);top:calc(var(--safe)*1.75);height:var(--header-h);z-index:20;display:grid;grid-template-columns:minmax(420px,1.55fr) minmax(250px,.9fr) auto;gap:clamp(12px,1.4vw,24px);align-items:center}.glass{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.045));backdrop-filter:blur(20px) saturate(145%);box-shadow:0 18px 44px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12)}
    .hello{height:100%;border-radius:26px;display:flex;align-items:center;gap:clamp(12px,1.3vw,22px);padding:clamp(12px,1.5vw,22px) clamp(16px,2vw,34px);overflow:hidden}.hello>div{min-width:0;flex:1 1 auto}.logo{width:clamp(56px,7vh,92px);height:clamp(56px,7vh,92px);object-fit:contain;filter:drop-shadow(0 8px 22px rgba(0,0,0,.36));flex:0 0 auto}.hello-line{font-size:clamp(22px,2.3vw,44px);font-weight:900;letter-spacing:-.04em;line-height:1.02;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 8px 26px rgba(0,0,0,.34)}.pill{display:none}
    .weather{min-width:clamp(240px,22vw,340px);height:100%;border-radius:26px;padding:clamp(10px,1vw,16px) clamp(12px,1.2vw,18px);display:grid;grid-template-rows:1fr 1fr;gap:6px}.weather-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:clamp(6px,.8vw,12px);align-items:center;min-width:0}.wicon{font-size:clamp(18px,1.8vw,28px)}.place{font-size:clamp(11px,.9vw,15px);font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.temp{font-size:clamp(17px,1.7vw,28px);font-weight:950;letter-spacing:-.04em}.desc{font-size:clamp(10px,.78vw,13px);color:var(--muted);font-weight:750;white-space:nowrap}.clock-card{height:100%;min-width:clamp(190px,18vw,310px);border-radius:26px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;padding:clamp(10px,1.3vw,22px) clamp(16px,1.9vw,32px)}.clock{font-family:ui-monospace,Menlo,Consolas,"Courier New",monospace;font-size:clamp(38px,5.5vw,86px);line-height:.94;color:var(--clock);font-weight:950;letter-spacing:-.065em;font-variant-numeric:tabular-nums;text-shadow:0 0 22px rgba(255,255,255,.12),0 8px 28px rgba(0,0,0,.36)}.date{margin-top:10px;color:rgba(255,255,255,.78);font-size:clamp(13px,1.25vw,20px);font-weight:850;white-space:nowrap}
    .stage{position:absolute;left:calc(var(--safe)*2.35);right:calc(var(--safe)*2.35);top:calc(var(--safe)*2.1 + var(--header-h) + clamp(18px,2.1vh,34px));bottom:calc(var(--safe)*1.75 + var(--dock-h));z-index:10;display:grid;grid-template-rows:auto 1fr auto;min-height:0}.title{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:clamp(8px,1vh,16px);font-size:clamp(18px,2.1vw,34px);font-weight:900;letter-spacing:-.035em;color:rgba(255,255,255,.86);text-shadow:0 8px 28px rgba(0,0,0,.38)}.spark{filter:drop-shadow(0 0 12px color-mix(in srgb,var(--a) 50%,transparent))}.poster-shell{position:relative;min-height:0;width:min(100%,calc((100vh - var(--header-h) - var(--dock-h) - 112px)*.72));max-width:82vw;justify-self:center;border-radius:clamp(22px,2.6vw,42px);padding:clamp(6px,.75vw,12px);background:linear-gradient(135deg,rgba(255,255,255,.34),rgba(255,255,255,.07) 42%,rgba(255,255,255,.2)),linear-gradient(135deg,var(--a),var(--b));box-shadow:0 36px 90px rgba(0,0,0,.44),0 0 0 1px rgba(255,255,255,.12),0 0 72px color-mix(in srgb,var(--a) 20%,transparent),0 0 80px color-mix(in srgb,var(--b) 14%,transparent);overflow:hidden}.poster-shell:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.22),transparent 28%,transparent 72%,rgba(255,255,255,.14));z-index:3;pointer-events:none}.viewport{position:relative;width:100%;height:100%;border-radius:calc(clamp(22px,2.6vw,42px) - 8px);overflow:hidden;background:rgba(0,0,0,.16)}.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;opacity:0;transform:translate3d(0,0,0) scale(1);will-change:opacity,transform,filter}.slide.on{opacity:1}
    .carousel{height:clamp(38px,4.6vh,58px);display:flex;align-items:center;justify-content:center;gap:clamp(12px,1.4vw,24px);font-weight:900;font-size:clamp(15px,1.4vw,22px);font-variant-numeric:tabular-nums;color:rgba(255,255,255,.88)}.pline{width:min(30vw,360px);height:2px;background:rgba(255,255,255,.16);border-radius:999px;overflow:hidden}.pfill{height:100%;width:0;background:linear-gradient(90deg,var(--a),var(--b));box-shadow:0 0 18px color-mix(in srgb,var(--a) 55%,transparent);border-radius:inherit}.pfill.run{animation:progress var(--dur) linear forwards}@keyframes progress{from{width:0}to{width:100%}}.dots{display:flex;gap:9px}.dot{width:clamp(7px,.8vw,11px);height:clamp(7px,.8vw,11px);border-radius:999px;background:rgba(255,255,255,.24)}.dot.active{background:#fff;box-shadow:0 0 18px color-mix(in srgb,var(--a) 75%,transparent);transform:scale(1.12)}
    .dock{position:absolute;left:calc(var(--safe)*2.1);right:calc(var(--safe)*2.1);bottom:calc(var(--safe)*1.75);height:var(--dock-h);z-index:20;display:grid;grid-template-rows:1fr auto;gap:clamp(12px,1.4vh,20px)}.qrgrid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(12px,1.8vw,28px);min-height:0}.qrcard{position:relative;min-width:0;border-radius:26px;padding:clamp(14px,1.6vw,28px);display:grid;grid-template-columns:1fr auto;gap:clamp(12px,1.5vw,24px);align-items:center;overflow:hidden}.qrcard:before{content:"";position:absolute;inset:-30%;z-index:-1;opacity:.7;background:radial-gradient(circle at 18% 76%,var(--ga),transparent 34%),radial-gradient(circle at 92% 18%,var(--gb),transparent 38%)}.moksial{--ga:rgba(231,49,57,.42);--gb:rgba(7,155,57,.34)}.miasto{--ga:rgba(101,217,255,.36);--gb:rgba(255,177,59,.30)}.qrtitle{font-size:clamp(20px,2.6vw,40px);line-height:1.02;font-weight:950;letter-spacing:-.055em}.qrtitle strong{display:block;font-size:1.1em}.moksial .qrtitle strong{background:linear-gradient(90deg,#e73139,#ff8a39,#e4df00,#079b39);-webkit-background-clip:text;background-clip:text;color:transparent}.miasto .qrtitle strong{background:linear-gradient(90deg,#65d9ff,#7f93ff,#fff);-webkit-background-clip:text;background-clip:text;color:transparent}.help{margin-top:clamp(10px,1.4vh,18px);color:rgba(255,255,255,.78);font-size:clamp(13px,1.3vw,19px);font-weight:750}.qri{width:clamp(120px,13vw,206px);height:clamp(120px,13vw,206px);border-radius:clamp(18px,1.8vw,28px);background:rgba(255,255,255,.96);display:grid;place-items:center;box-shadow:0 18px 42px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.9);overflow:hidden}.qri img{width:92%;height:92%;object-fit:contain}.strip{min-height:clamp(54px,6.5vh,78px);border-radius:999px;padding:0 clamp(18px,2.2vw,36px);display:flex;align-items:center;gap:16px;color:rgba(255,255,255,.74);font-size:clamp(14px,1.55vw,24px);font-weight:800;white-space:nowrap;overflow:hidden}.info{width:clamp(30px,3.4vw,46px);height:clamp(30px,3.4vw,46px);border-radius:999px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.25);flex:0 0 auto}.infotxt{overflow:hidden;text-overflow:ellipsis}.msg{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;background:rgba(3,6,12,.86);font-size:clamp(20px,2.2vw,34px);font-weight:900}.err{color:#ffb6b6}
    @media (orientation:landscape){:root{--dock-h:clamp(150px,23vh,230px);--header-h:clamp(78px,12vh,116px)}.stage{left:calc(var(--safe)*2.25);right:calc(50vw + var(--safe)*.5);bottom:calc(var(--safe)*1.75 + 14px)}.poster-shell{width:100%;max-width:none}.dock{left:calc(50vw + var(--safe)*.5);top:calc(var(--safe)*2.1 + var(--header-h) + clamp(18px,2.1vh,34px));bottom:calc(var(--safe)*1.75);height:auto}.qrgrid{grid-template-columns:1fr;grid-template-rows:1fr 1fr}.qri{width:clamp(100px,14vh,170px);height:clamp(100px,14vh,170px)}}
    @media (max-width:820px),(max-height:820px){:root{--safe:10px}.header{left:20px;right:20px;grid-template-columns:minmax(0,1fr) auto}.weather{display:none}.stage{left:24px;right:24px}.dock{left:20px;right:20px}.qrcard{padding:14px}.hello-line{font-size:clamp(20px,4.1vw,34px)}}
  </style>
</head>
<body>
<div id="app">
  <img id="bgA" class="bg on" alt=""><img id="bgB" class="bg" alt=""><div class="grain"></div><div class="frame"></div>
  <header class="header">
    <section class="hello glass"><img id="logo" class="logo" src="logo-moksial.svg" alt="MOKSiAL"><div><div id="topmsg" class="hello-line">Miłego dnia</div><div id="mode" class="pill">MOKSiAL</div></div></section>
    <section id="weather" class="weather glass"><div class="weather-row"><div id="wi1" class="wicon">☁️</div><div class="place">Szklarska Poręba</div><div id="wt1" class="temp">--°</div><div id="wd1" class="desc">--</div></div><div class="weather-row"><div id="wi2" class="wicon">☁️</div><div class="place">Śnieżka</div><div id="wt2" class="temp">--°</div><div id="wd2" class="desc">--</div></div></section>
    <section class="clock-card glass"><div id="clock" class="clock">00:00</div><div id="date" class="date">--</div></section>
  </header>
  <main class="stage"><div class="title"><span class="spark">✦</span><span id="sect">Wydarzenie dnia</span></div><section class="poster-shell"><div class="viewport"><img id="sA" class="slide on" alt="Plakat"><img id="sB" class="slide" alt="Plakat"></div></section><section class="carousel"><div class="pline"><div id="pfill" class="pfill"></div></div><div id="counter">00 / 00</div><div id="dots" class="dots"></div></section></main>
  <footer class="dock"><section class="qrgrid"><article class="qrcard moksial glass"><div><div class="qrtitle">Wydarzenia <strong>MOKSiAL</strong></div><div class="help">Skanuj po więcej ↗</div></div><div class="qri"><img id="qrm" src="qr-moksial.png" alt="Kod QR MOKSiAL"></div></article><article class="qrcard miasto glass"><div><div class="qrtitle">Wydarzenia <strong>miasta</strong></div><div class="help">Skanuj po więcej ↗</div></div><div class="qri"><img id="qrc" src="qr-miasto.png" alt="Kod QR Miasta"></div></article></section><section class="strip glass"><span class="info">i</span><span id="foot" class="infotxt">MOKSiAL • kino • koncerty • warsztaty • wydarzenia miejskie • zeskanuj kod QR</span></section></footer>
  <div id="msg" class="msg">Ładowanie plakatów...</div>
</div>
<script>
const normalDur=8000,longDur=30000,reload=900000,valid=/\.(jpg|jpeg|png|webp|gif)$/i;let cfg,imgs=[],idx=0,act=0,bg=0,timer=null,started=false,msgs=[],last=-1;const $=id=>document.getElementById(id);const els={msg:$('msg'),clock:$('clock'),date:$('date'),top:$('topmsg'),mode:$('mode'),sect:$('sect'),logo:$('logo'),foot:$('foot'),qrm:$('qrm'),qrc:$('qrc'),sA:$('sA'),sB:$('sB'),bgA:$('bgA'),bgB:$('bgB'),counter:$('counter'),dots:$('dots'),pfill:$('pfill'),weather:$('weather'),wi1:$('wi1'),wt1:$('wt1'),wd1:$('wd1'),wi2:$('wi2'),wt2:$('wt2'),wd2:$('wd2')};
function mode(){const p=new URLSearchParams(location.search);return(p.get('ekran')||p.get('ekra')||'moksial').toLowerCase()}async function json(f){const r=await fetch(f+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(f);return r.json()}function show(t,e=false){els.msg.textContent=t;els.msg.className=e?'msg err':'msg';els.msg.style.display='flex'}function hide(){els.msg.style.display='none'}
async function loadCfg(){cfg=await json(`config-${mode()==='miasto'?'miasto':mode()==='hybryda'?'hybryda':'moksial'}.json`);document.title=cfg.title||'Ekrany informacyjne';let r=document.documentElement;r.style.setProperty('--clock',cfg.clockColor||'#fff');r.style.setProperty('--a',cfg.accentA||'#65d9ff');r.style.setProperty('--b',cfg.accentB||'#ff4f91');r.style.setProperty('--c',cfg.accentC||'#ffcf4a');r.style.setProperty('--d',cfg.accentD||'#58d56b');els.mode.textContent=cfg.modeLabel||mode().toUpperCase();els.sect.textContent=cfg.sectionTitle||'Wydarzenie dnia';els.foot.textContent=cfg.footerText||els.foot.textContent;cfg.logoMoksial=cfg.logoMoksial||'logo-moksial.png';cfg.logoMiasto=cfg.logoMiasto||'logo-szklarska.png';els.logo.src=(mode()==='miasto'?cfg.logoMiasto:cfg.logoMoksial)+'?v='+Date.now();els.qrm.src=(cfg.qrMoksial||'qr-moksial.png')+'?v='+Date.now();els.qrc.src=(cfg.qrMiasto||'qr-miasto.png')+'?v='+Date.now();msgs=(cfg.topMessages&&cfg.topMessages.length)?cfg.topMessages:['Miłego dnia'];els.top.textContent=pickMsg();setInterval(rotMsg,60000)}
function pickMsg(){let i=Math.floor(Math.random()*msgs.length);if(msgs.length>1)while(i===last)i=Math.floor(Math.random()*msgs.length);last=i;return msgs[i]}function rotMsg(){els.top.animate([{opacity:1,transform:'translateY(0)',filter:'blur(0)'},{opacity:0,transform:'translateY(-10px)',filter:'blur(8px)'}],{duration:520,easing:'ease'}).onfinish=()=>{els.top.textContent=pickMsg();els.top.animate([{opacity:0,transform:'translateY(10px)',filter:'blur(8px)'},{opacity:1,transform:'translateY(0)',filter:'blur(0)'}],{duration:620,easing:'ease'})}}
function clock(){let n=new Date();els.clock.textContent=n.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});els.date.textContent=n.toLocaleDateString('pl-PL',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}function wv(c){if(c===0)return['☀️','Słonecznie'];if(c===1||c===2)return['🌤️','Dość ładnie'];if(c===3)return['☁️','Pochmurno'];if(c===45||c===48)return['🌫️','Mgła'];if((c>=51&&c<=67)||(c>=80&&c<=82))return['🌧️','Deszcz'];if((c>=71&&c<=77)||(c>=85&&c<=86))return['❄️','Śnieg'];if(c>=95)return['⛈️','Burza'];return['🌤️','Pogoda']}async function weather(){try{let [a,b]=await Promise.all([fetch('https://api.open-meteo.com/v1/forecast?latitude=50.83&longitude=15.52&current=temperature_2m,weather_code',{cache:'no-store'}),fetch('https://api.open-meteo.com/v1/forecast?latitude=50.736&longitude=15.739&current=temperature_2m,weather_code',{cache:'no-store'})]);if(!a.ok||!b.ok)throw Error();let c=await a.json(),s=await b.json(),cv=wv(c.current.weather_code),sv=wv(s.current.weather_code);els.wi1.textContent=cv[0];els.wd1.textContent=cv[1];els.wt1.textContent=Math.round(c.current.temperature_2m)+'°';els.wi2.textContent=sv[0];els.wd2.textContent=sv[1];els.wt2.textContent=Math.round(s.current.temperature_2m)+'°';els.weather.style.display='grid'}catch(e){els.weather.style.display='none'}}
function setLogoFor(src){let low=(src||'').toLowerCase();let logo=cfg.logoMoksial||'logo-moksial.png';if(mode()==='miasto'||low.includes('plakaty-miasto'))logo=cfg.logoMiasto||'logo-szklarska.png';if(mode()==='moksial'||low.includes('plakaty-moksial'))logo=cfg.logoMoksial||'logo-moksial.png';let wanted=logo+'?v='+Date.now();if(!els.logo.src.endsWith(logo))els.logo.src=wanted}
async function loadImgs(){try{let a=await json(cfg.postersJson);imgs=a.filter(x=>typeof x==='string'&&valid.test(x));if(!imgs.length)throw Error();hide();dots();if(!started){start();started=true}}catch(e){show('Nie udało się wczytać plakatów z pliku '+cfg.postersJson,true)}}function dur(src){return src.split('/').pop().toLowerCase().includes('dluzej')?longDur:normalDur}function active(){return act?els.sB:els.sA}function inactive(){return act?els.sA:els.sB}function activeBg(){return bg?els.bgB:els.bgA}function inactiveBg(){return bg?els.bgA:els.bgB}function dots(){els.dots.innerHTML='';for(let i=0;i<Math.min(imgs.length,6);i++){let d=document.createElement('span');d.className='dot';els.dots.appendChild(d)}}function carousel(i,d){els.counter.textContent=String(i+1).padStart(2,'0')+' / '+String(imgs.length).padStart(2,'0');[...els.dots.children].forEach((x,n)=>x.classList.toggle('active',n===i%Math.max(1,els.dots.children.length)));document.documentElement.style.setProperty('--dur',d+'ms');els.pfill.classList.remove('run');void els.pfill.offsetWidth;els.pfill.classList.add('run')}function setBg(src){let c=activeBg(),n=inactiveBg();n.onload=()=>{n.classList.add('on');c.classList.remove('on');bg=bg?0:1};n.src=src}function trans(si,so,t,d){si.className='slide';si.style.transition='none';si.style.opacity=0;si.style.transform='translate3d(0,0,0) scale(1) rotate(0)';let inf=Math.min(1800,d*.22),out=Math.min(1300,d*.16);if(t==='zoom'){si.style.transform='scale(1.045)';void si.offsetHeight;si.style.transition=`opacity ${inf}ms ease,transform ${d}ms linear`;so.style.transition=`opacity ${out}ms ease`;si.style.opacity=1;si.style.transform='scale(1)';so.style.opacity=0}else{let x=t==='left'?4:t==='right'?-4:0,y=t==='rise'?3:0;si.style.transform=`translate3d(${x}%,${y}%,0) scale(1)`;void si.offsetHeight;si.style.transition=`opacity ${inf}ms ease,transform ${inf}ms ease`;so.style.transition=`opacity ${out}ms ease,transform ${out}ms ease`;si.style.opacity=1;si.style.transform='translate3d(0,0,0) scale(1)';so.style.opacity=0;so.style.transform=`translate3d(${-x/2}%,-${y/2}%,0) scale(1)`}si.classList.add('on');so.classList.remove('on')}function rt(){return['fade','rise','left','right','zoom'][Math.floor(Math.random()*5)]}function schedule(d){clearTimeout(timer);timer=setTimeout(next,d)}function next(){let so=active(),si=inactive(),src=imgs[idx],d=dur(src),i=idx;setLogoFor(src);si.onload=()=>{setBg(src);trans(si,so,rt(),d);carousel(i,d);act=act?0:1;idx=(idx+1)%imgs.length;schedule(d)};si.onerror=()=>{idx=(idx+1)%imgs.length;schedule(1200)};si.src=src}function start(){let src=imgs[idx],d=dur(src),s=active(),b=activeBg();setLogoFor(src);b.src=src;b.onload=()=>b.classList.add('on');s.onload=()=>{s.style.transition='opacity 1000ms ease';s.style.opacity=1;s.classList.add('on');carousel(idx,d);idx=(idx+1)%imgs.length;schedule(d)};s.onerror=()=>show('Nie udało się załadować pierwszego plakatu.',true);s.src=src}
(async function(){try{await loadCfg();clock();setInterval(clock,1000);await weather();setInterval(weather,900000);await loadImgs();setInterval(()=>location.reload(),reload)}catch(e){console.error(e);show('Nie udało się uruchomić ekranu.',true)}})();
</script>
</body>
</html>
